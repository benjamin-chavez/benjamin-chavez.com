name: Deploy
run-name: ""

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-east-2
  CDK_STACK_NAME: BenjaminChavezDotCom

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
        contents: read
        id-token: write  # Needed for AWS OIDC
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node.js and PNPM
        id: setup-node-pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read CDK stack outputs
        id: stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$CDK_STACK_NAME" \
            --query 'Stacks[0].Outputs' --output json)
          BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="BucketName") | .OutputValue')
          DIST_ID=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="DistributionId") | .OutputValue')
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        env:
          BUCKET: ${{ steps.stack.outputs.bucket }}
        run: aws s3 sync out/ "s3://$BUCKET" --delete

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ steps.stack.outputs.dist_id }}
        run: aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

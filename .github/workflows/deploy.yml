name: Deploy
run-name: "🚀 Deploy #${{ github.run_number }} | ${{ github.sha }}"

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-east-2
  CDK_STACK_NAME: BenjaminChavezDotCom

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
        contents: write  # Read for checkout, write for deployment tags
        id-token: write  # Needed for AWS OIDC
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node.js and PNPM
        id: setup-node-pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read CDK stack outputs
        id: stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$CDK_STACK_NAME" \
            --query 'Stacks[0].Outputs' --output json)
          BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="BucketName") | .OutputValue')
          DIST_ID=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="DistributionId") | .OutputValue')
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        env:
          BUCKET: ${{ steps.stack.outputs.bucket }}
        run: aws s3 sync out/ "s3://$BUCKET" --delete

      - name: Invalidate CloudFront cache
        env:
          DIST_ID: ${{ steps.stack.outputs.dist_id }}
        run: aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"

      - name: Tag deployment
        run: |
          # Find latest v* tag, default to v0.0.0 if none exists
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi

          # Extract major.minor.patch and bump patch
          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "Tagged deployment as $NEW_TAG"

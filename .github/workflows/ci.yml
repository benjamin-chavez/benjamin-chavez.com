#.github/workflows/ci.yml

name: CI
run-name: "CI #${{ github.run_number }} | ${{ github.sha }}"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  CDK_STACK_NAME: BenjaminChavezDotCom
  APP_URL: https://benjamin-chavez.com
  ARTIFACT_NAME: dist
  TAG_PREFIX: v

permissions:
  contents: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-static-site.yml
    with:
      app_url: ${{ env.APP_URL }}
      artifact_name: ${{ env.ARTIFACT_NAME }}
      aws_region: ${{ env.AWS_REGION }}
    secrets: inherit

  lighthouse:
    name: Lighthouse
    needs: build
    uses: ./.github/workflows/lighthouse-static-site.yml
    with:
      artifact_name: ${{ env.ARTIFACT_NAME }}

  deploy:
    name: Deploy
    needs: [build, lighthouse]
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/deploy-static-site.yml
    with:
      artifact_name: ${{ env.ARTIFACT_NAME }}
      aws_region: ${{ env.AWS_REGION }}
      cdk_stack_name: ${{ env.CDK_STACK_NAME }}
      tag_prefix: ${{ env.TAG_PREFIX }}
    secrets: inherit

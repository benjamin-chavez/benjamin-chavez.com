#.github/workflows/ci.yml

name: CI
run-name: "CI #${{ github.run_number }} | ${{ github.sha }}"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }} # Cancel older runs when new commits push

permissions:
  contents: read

jobs:
  github-workflow-lint:
    name: GitHub Workflow Lint
    uses: ./.github/workflows/github-workflow-lint.yml

  build:
    name: Build
    uses: ./.github/workflows/build-static-site.yml
    with:
      app_url: ${{ vars.NEXT_PUBLIC_APP_URL }}
      artifact_name: dist
      aws_region: ${{ vars.NEXT_PUBLIC_AWS_REGION }}
    secrets: inherit

  lighthouse:
    name: Lighthouse
    needs: build
    uses: ./.github/workflows/lighthouse-static-site.yml
    with:
      artifact_name: dist

  deploy:
    name: Deploy
    needs: [github-workflow-lint, build, lighthouse]
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/deploy-static-site.yml
    with:
      artifact_name: dist
      aws_region: ${{ vars.NEXT_PUBLIC_AWS_REGION }}
      cdk_stack_name: ${{ vars.CDK_STACK_NAME }}
      tag_prefix: v
    secrets: inherit
